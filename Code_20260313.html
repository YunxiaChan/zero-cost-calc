<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>0成本减仓计算器</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui, sans-serif;}
    body{background:#1a1a1a;color:#fff;padding:12px;margin:0;}
    .panel{max-width:320px;margin:0 auto;background:#222;padding:12px;border-radius:10px;}
    .row{margin:8px 0;display:flex;gap:6px;align-items:center;}
    label{width:70px;font-size:14px;}
    input{width:100%;padding:6px 8px;background:#333;color:#fff;border:1px solid #444;border-radius:6px;font-size:14px;}
    /* 新增radio样式，适配整体风格 */
    .radio-group{display:flex;gap:12px;width:100%;}
    .radio-item{display:flex;align-items:center;gap:4px;cursor:pointer;}
    .radio-item input[type="radio"]{width:auto;height:14px;accent-color:#007bff;}
    .btn{background:#007bff;color:#fff;border:none;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:14px;}
    .btn:active{background:#0056b3;}
    .result{margin-top:10px;padding:10px;background:#111;border-radius:8px;font-size:15px;line-height:1.4;}
    .green{color:#0c0;}
    .gray{color:#aaa;}
  </style>
</head>
<body>
<div class="panel">
  <div class="row">
    <label>入场价</label>
    <input type="number" id="entry">
  </div>
  <!-- 把原输入框改成radio单选组 -->
  <div class="row">
    <label>方向</label>
    <div class="radio-group">
      <div class="radio-item">
        <input type="radio" name="direction" id="sell" value="sell" checked>
        <label for="sell" style="width:auto;">卖出</label>
      </div>
      <div class="radio-item">
        <input type="radio" name="direction" id="buy" value="buy">
        <label for="buy" style="width:auto;">买入</label>
      </div>
    </div>
  </div>
  <div class="row">
    <label>止损价</label>
    <input type="number" id="stop">
  </div>
  <div class="row">
    <label>总手数</label>
    <input type="number" id="lots">
  </div>
  <div class="row">
    <label>现价</label>
    <input type="number" id="now" placeholder="点一下输入">
    <button class="btn" onclick="calc()">计算 0 成本</button>
  </div>
  <div class="result" id="result"></div>
</div>

<script>
function $(id){return document.getElementById(id)}
function calc(){
  const entry = +$('entry').value
  // 修改：获取radio选中的值，替代原输入框取值
  const type = document.querySelector('input[name="direction"]:checked').value
  const stop = +$('stop').value
  const now = +$('now').value
  const lots = +$('lots').value

  if(!entry || !stop || !now || !lots || !['buy','sell'].includes(type)){
    $('result').innerHTML = '请填完整'
    return
  }

  const stopPoints = Math.abs(entry - stop)
  const profitPoints = type === 'buy' ? now - entry : entry - now

  if(profitPoints <= 0){
    $('result').innerHTML = `未盈利<br>止损点数：${stopPoints} | 浮盈：${profitPoints.toFixed(1)}`
    return
  }

  const ratio = stopPoints / (profitPoints + stopPoints)
  const close = lots * ratio
  const keep = lots * (1 - ratio)

  $('result').innerHTML = `
    <span class=green>✅ 0 成本仓位</span><br>
    需平掉：${close.toFixed(3)} 手<br>
    需保留：${keep.toFixed(3)} 手<br>
    <span class=gray>止损 ${stopPoints} 点 | 浮盈 ${profitPoints.toFixed(1)} 点</span>
  `
}
</script>
</body>
</html>
